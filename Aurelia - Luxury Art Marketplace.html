document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n      <div style=\"animation:auFade .9s ease both\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.28em;text-transform:uppercase;color:var(--bronze);margin-bottom:26px\">Un mercato di maestri su commissione<\u002Fspan>\n        <h1 style=\"font:300 clamp(2.7rem,6.4vw,5.6rem)/1.0 var(--display);letter-spacing:-.015em;color:var(--ink);margin:0;max-width:17ch;text-wrap:balance\">Commissiona arte senza tempo ad artisti straordinari.<\u002Fh1>\n        <p style=\"font:400 clamp(15px,1.15vw,18px)/1.65 var(--sans);color:var(--ink2);max-width:46ch;margin:30px 0 0\">Una galleria privata dove le mani più singolari al mondo dipingono, stampano e reinterpretano la tua visione — realizzata come un’opera originale, destinata a durare.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px 28px;margin-top:44px\">\n          <button sc-camel-on-click=\"{{ browse }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px 40px;border-radius:2px;transition:background .3s\" style-hover=\"background:var(--bronze)\">Esplora gli Artisti<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ createAI }}\" style=\"display:inline-flex;align-items:center;gap:12px;font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--ink);padding:18px 4px;border-bottom:1px solid var(--ink)\" style-hover=\"color:var(--accent);border-color:var(--accent)\">Crea con l’IA <span style=\"font-size:15px\">→<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px\">\n      <span style=\"font:500 9px/1 var(--mono);letter-spacing:.24em;text-transform:uppercase;color:var(--ink3)\">Scorri<\u002Fspan>\n      <span style=\"width:1px;height:40px;background:linear-gradient(var(--ink3),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURED ARTISTS -->\n  <section id=\"featured\" style=\"padding:clamp(76px,11vh,150px) clamp(20px,4vw,56px);background:var(--paper)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:clamp(40px,6vw,72px)\">\n        <div>\n          <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">I Maestri in Evidenza<\u002Fspan>\n          <h2 style=\"font:300 clamp(2.1rem,4.6vw,3.5rem)/1.04 var(--display);letter-spacing:-.01em;margin:0;max-width:15ch\">Mani straordinarie, alla tua commissione.<\u002Fh2>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ browse }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:8px;white-space:nowrap\" style-hover=\"color:var(--accent);border-color:var(--accent)\">Tutti gli artisti →<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:clamp(20px,2.5vw,40px)\">\n        <sc-for list=\"{{ featuredArtists }}\" as=\"a\" hint-placeholder-count=\"3\">\n          <article style=\"display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line2)\">\n            <button sc-camel-on-click=\"{{ a.view }}\" style=\"display:block;text-align:left;width:100%;aspect-ratio:4/5;position:relative;overflow:hidden;background-color:#EEE7D8;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.05) 0 1px,transparent 1px 16px)\">\n              <span style=\"position:absolute;top:16px;left:16px;font:500 10px/1.4 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 10px\">Ritratto dell’Artista<\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"padding:clamp(22px,2vw,32px);display:flex;flex-direction:column;flex:1\">\n              <span style=\"font:500 11px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:14px\">{{ a.style }}<\u002Fspan>\n              <h3 style=\"font:400 clamp(1.5rem,2vw,1.9rem)/1.1 var(--display);margin:0 0 12px\">{{ a.name }}<\u002Fh3>\n              <p style=\"font:400 14.5px/1.65 var(--sans);color:var(--ink2);margin:0 0 26px;flex:1\">{{ a.tagline }}<\u002Fp>\n              <div style=\"display:flex;gap:22px;align-items:center;border-top:1px solid var(--line2);padding-top:20px\">\n                <button sc-camel-on-click=\"{{ a.view }}\" style=\"font:500 11.5px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink)\" style-hover=\"color:var(--accent)\">Vedi Profilo<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ a.commission }}\" style=\"font:500 11.5px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)\" style-hover=\"color:var(--accent)\">Commissiona<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURED ARTWORKS (masonry) -->\n  <section style=\"padding:clamp(76px,11vh,150px) clamp(20px,4vw,56px);background:var(--bg)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <div style=\"text-align:center;margin-bottom:clamp(40px,6vw,72px)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">Opere Selezionate<\u002Fspan>\n        <h2 style=\"font:300 clamp(2.1rem,4.6vw,3.5rem)/1.04 var(--display);letter-spacing:-.01em;margin:0 auto;max-width:20ch\">Un catalogo vivente del possibile.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"columns:clamp(200px,26vw,320px);column-gap:clamp(16px,1.8vw,26px)\">\n        <sc-for list=\"{{ gallery }}\" as=\"w\" hint-placeholder-count=\"9\">\n          <figure sc-camel-on-click=\"{{ w.open }}\" style=\"cursor:pointer;break-inside:avoid;margin:0 0 clamp(16px,1.8vw,26px);position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line2)\">\n            <div style=\"aspect-ratio:{{ w.ratio }};background-color:#EEE7D8;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.05) 0 1px,transparent 1px 16px);display:flex;align-items:center;justify-content:center\">\n              <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px;text-align:center\">{{ w.slot }}<\u002Fspan>\n            <\u002Fdiv>\n            <figcaption style=\"position:absolute;inset:auto 0 0 0;padding:22px 20px 18px;background:linear-gradient(to top,rgba(24,21,17,.82),transparent);opacity:0;transition:opacity .4s ease\" style-hover=\"opacity:1\">\n              <span style=\"display:block;font:400 18px/1.2 var(--display);color:#F5F1E8\">{{ w.title }}<\u002Fspan>\n              <span style=\"display:flex;justify-content:space-between;gap:12px;margin-top:6px;font:500 10.5px/1.4 var(--sans);letter-spacing:.1em;text-transform:uppercase;color:rgba(245,241,232,.7)\"><span>{{ w.artist }}<\u002Fspan><span>{{ w.priceLabel }}<\u002Fspan><\u002Fspan>\n            <\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS (dark) -->\n  <section id=\"how\" style=\"padding:clamp(80px,12vh,160px) clamp(20px,4vw,56px);background:var(--ink);color:var(--bg)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <div style=\"max-width:640px;margin-bottom:clamp(48px,7vw,88px)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:22px\">La Commissione<\u002Fspan>\n        <h2 style=\"font:300 clamp(2.1rem,4.6vw,3.5rem)/1.05 var(--display);letter-spacing:-.01em;margin:0;color:var(--bg)\">Un processo meditato, in quattro movimenti.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:clamp(28px,3vw,56px)\">\n        <sc-for list=\"{{ howSteps }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"border-top:1px solid rgba(245,241,232,.18);padding-top:26px\">\n            <span style=\"display:block;font:300 clamp(2.6rem,3.5vw,3.4rem)/1 var(--display);color:var(--accent);margin-bottom:24px\">{{ s.n }}<\u002Fspan>\n            <h3 style=\"font:400 1.5rem/1.15 var(--display);margin:0 0 12px;color:var(--bg)\">{{ s.title }}<\u002Fh3>\n            <p style=\"font:400 14.5px/1.7 var(--sans);color:rgba(245,241,232,.66);margin:0\">{{ s.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALS -->\n  <section style=\"padding:clamp(76px,11vh,150px) clamp(20px,4vw,56px);background:var(--paper)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:clamp(40px,6vw,72px)\">Le Loro Parole<\u002Fspan>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:clamp(24px,3vw,48px)\">\n        <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <figure style=\"margin:0;display:flex;flex-direction:column;gap:26px\">\n            <span style=\"font:300 44px/1 var(--display);color:var(--accent)\">“<\u002Fspan>\n            <blockquote style=\"font:300 clamp(1.25rem,1.7vw,1.6rem)/1.4 var(--display);color:var(--ink);margin:0;flex:1;text-wrap:pretty\">{{ t.quote }}<\u002Fblockquote>\n            <figcaption style=\"border-top:1px solid var(--line);padding-top:18px\"><span style=\"display:block;font:500 13px/1.3 var(--sans);color:var(--ink)\">{{ t.name }}<\u002Fspan><span style=\"font:400 12px/1.4 var(--sans);color:var(--ink3)\">{{ t.role }}<\u002Fspan><\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section style=\"padding:clamp(76px,11vh,150px) clamp(20px,4vw,56px);background:var(--bg)\">\n    <div style=\"max-width:900px;margin:0 auto\">\n      <div style=\"text-align:center;margin-bottom:clamp(40px,6vw,64px)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">Richieste<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);letter-spacing:-.01em;margin:0\">Domande ricorrenti.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid var(--line)\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <div style=\"border-bottom:1px solid var(--line)\">\n            <button sc-camel-on-click=\"{{ f.toggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:24px;text-align:left;padding:clamp(20px,2.5vw,30px) 4px\">\n              <span style=\"font:400 clamp(1.15rem,1.7vw,1.5rem)/1.3 var(--display);color:var(--ink)\">{{ f.q }}<\u002Fspan>\n              <span style=\"font:300 26px/1 var(--display);color:var(--accent);flex:none;transition:transform .3s;transform:{{ f.rot }}\">+<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font:400 15px/1.75 var(--sans);color:var(--ink2);margin:0;padding:0 4px clamp(24px,3vw,34px);max-width:64ch\">{{ f.a }}<\u002Fp><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA BAND -->\n  <section style=\"padding:clamp(72px,10vh,130px) clamp(20px,4vw,56px);background:var(--bronze);color:var(--bg);text-align:center\">\n    <div style=\"max-width:820px;margin:0 auto\">\n      <h2 style=\"font:300 clamp(2.2rem,5vw,4rem)/1.02 var(--display);letter-spacing:-.01em;margin:0 0 22px;color:var(--bg)\">Inizia un’opera tutta tua.<\u002Fh2>\n      <p style=\"font:400 clamp(15px,1.1vw,17px)/1.65 var(--sans);color:rgba(245,241,232,.78);margin:0 auto 40px;max-width:48ch\">Descrivi la tua visione, scegli un artista e visualizza in anteprima una commissione su misura in pochi minuti.<\u002Fp>\n      <button sc-camel-on-click=\"{{ createAI }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--bg);color:var(--ink);padding:20px 44px;border-radius:2px\" style-hover=\"background:var(--ink);color:var(--bg)\">Inizia una Commissione<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ ARTIST PROFILE ============ -->\n<sc-if value=\"{{ isArtist }}\" hint-placeholder-val=\"{{ false }}\">\n<main>\n  <section style=\"position:relative;height:min(80vh,780px);display:flex;align-items:flex-end;overflow:hidden;background:#E7DFCF\">\n    <div style=\"position:absolute;inset:0;background-color:#E7DFCF;background-image:repeating-linear-gradient(120deg,rgba(94,75,54,.05) 0 1px,transparent 1px 22px);display:flex;align-items:center;justify-content:center\">\n      <span style=\"font:500 11px/1.4 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.22);padding:11px 16px\">Opera Simbolo · a tutto campo<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(20,17,13,.62) 0%,rgba(20,17,13,.12) 38%,transparent 62%)\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:2;max-width:1400px;margin:0 auto;width:100%;padding:0 clamp(20px,4vw,56px) clamp(40px,6vh,72px)\">\n      <button sc-camel-on-click=\"{{ browse }}\" style=\"display:inline-flex;align-items:center;gap:10px;font:500 11px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:rgba(245,241,232,.85);margin-bottom:26px\" style-hover=\"color:#fff\">← Tutti gli Artisti<\u002Fbutton>\n      <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:rgba(245,241,232,.82);margin-bottom:18px\">{{ artist.style }} · {{ artist.place }}<\u002Fspan>\n      <h1 style=\"font:300 clamp(2.6rem,7vw,5.4rem)/.98 var(--display);color:#F7F3EA;margin:0;letter-spacing:-.01em\">{{ artist.name }}<\u002Fh1>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding:clamp(56px,8vw,110px) clamp(20px,4vw,56px);background:var(--paper)\">\n    <div style=\"max-width:1400px;margin:0 auto;display:flex;flex-wrap:wrap;gap:clamp(36px,5vw,80px)\">\n      <div style=\"flex:0 1 320px;min-width:min(280px,100%)\">\n        <div style=\"aspect-ratio:4/5;position:relative;background-color:#EEE7D8;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.05) 0 1px,transparent 1px 16px);display:flex;align-items:center;justify-content:center;border:1px solid var(--line2)\">\n          <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px\">Ritratto dell’Artista<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:24px\">\n          <sc-for list=\"{{ artistTags }}\" as=\"t\" hint-placeholder-count=\"4\"><span style=\"font:500 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--bronze);border:1px solid var(--line);padding:9px 13px;border-radius:2px\">{{ t }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ artistCommission }}\" style=\"width:100%;margin-top:28px;font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Commissiona questo artista<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 440px;min-width:min(300px,100%)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:22px\">Biografia<\u002Fspan>\n        <p style=\"font:400 clamp(16px,1.3vw,19px)/1.75 var(--sans);color:var(--ink2);margin:0 0 40px;max-width:60ch\">{{ artist.bio }}<\u002Fp>\n        <div style=\"border-left:2px solid var(--accent);padding:6px 0 6px 30px\">\n          <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:18px\">Filosofia Artistica<\u002Fspan>\n          <p style=\"font:300 clamp(1.4rem,2.4vw,2.1rem)/1.4 var(--display);font-style:italic;color:var(--ink);margin:0;text-wrap:pretty\">“{{ artist.philosophy }}”<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding:clamp(72px,10vh,140px) clamp(20px,4vw,56px);background:var(--bg)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:clamp(36px,5vw,60px)\">\n        <div><span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Le Opere<\u002Fspan><h2 style=\"font:300 clamp(2rem,4.4vw,3.3rem)/1.04 var(--display);margin:0\">Disponibili e su commissione.<\u002Fh2><\u002Fdiv>\n        <span style=\"font:400 14px/1 var(--sans);color:var(--ink3)\">9 opere<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:clamp(20px,2.5vw,44px)\">\n        <sc-for list=\"{{ artistWorks }}\" as=\"w\" hint-placeholder-count=\"9\">\n          <article style=\"display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line2)\">\n            <div style=\"aspect-ratio:{{ w.ratio }};position:relative;background-color:#EEE7D8;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.05) 0 1px,transparent 1px 16px);display:flex;align-items:center;justify-content:center\">\n              <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px;text-align:center\">{{ w.slot }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:clamp(20px,1.6vw,28px);display:flex;flex-direction:column;flex:1\">\n              <h3 style=\"font:400 clamp(1.35rem,1.8vw,1.7rem)/1.15 var(--display);margin:0 0 10px\">{{ w.title }}<\u002Fh3>\n              <span style=\"font:400 13px/1.5 var(--sans);color:var(--ink3);margin-bottom:2px\">{{ w.medium }} · {{ w.year }}<\u002Fspan>\n              <span style=\"font:400 13px/1.5 var(--sans);color:var(--ink3);margin-bottom:18px\">{{ w.dim }}<\u002Fspan>\n              <span style=\"font:400 clamp(1.15rem,1.5vw,1.4rem)/1 var(--display);color:var(--ink);margin-bottom:22px\">{{ w.priceLabel }}<\u002Fspan>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;border-top:1px solid var(--line2);padding-top:18px\">\n                <button sc-camel-on-click=\"{{ w.buyDigital }}\" style=\"font:500 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:12px 15px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Acquista Digitale<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ w.finePrint }}\" style=\"font:500 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--ink);border:1px solid var(--line);padding:12px 15px;border-radius:2px\" style-hover=\"border-color:var(--ink)\">Stampa Fine Art<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ w.commission }}\" style=\"font:500 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--accent);padding:12px 8px\" style-hover=\"color:var(--bronze)\">Commissiona Simile<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding:clamp(72px,10vh,140px) clamp(20px,4vw,56px);background:var(--paper)\">\n    <div style=\"max-width:1400px;margin:0 auto\">\n      <span style=\"display:block;text-align:center;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:clamp(36px,5vw,60px)\">Note dei Collezionisti<\u002Fspan>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:clamp(24px,3vw,44px)\">\n        <sc-for list=\"{{ reviews }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <figure style=\"margin:0;background:var(--card);border:1px solid var(--line2);padding:clamp(28px,3vw,40px);display:flex;flex-direction:column;gap:20px\">\n            <div style=\"display:flex;gap:5px\"><sc-for list=\"{{ r.dots }}\" as=\"d\" hint-placeholder-count=\"5\"><sc-if value=\"{{ d.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent)\"><\u002Fspan><\u002Fsc-if><sc-if value=\"{{ d.off }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;height:7px;border-radius:50%;border:1px solid var(--line)\"><\u002Fspan><\u002Fsc-if><\u002Fsc-for><\u002Fdiv>\n            <blockquote style=\"font:300 clamp(1.15rem,1.5vw,1.4rem)/1.5 var(--display);color:var(--ink);margin:0;flex:1;text-wrap:pretty\">{{ r.text }}<\u002Fblockquote>\n            <figcaption style=\"border-top:1px solid var(--line2);padding-top:18px\"><span style=\"display:block;font:500 13px/1.3 var(--sans);color:var(--ink)\">{{ r.name }}<\u002Fspan><span style=\"font:400 12px/1.4 var(--sans);color:var(--ink3)\">{{ r.role }}<\u002Fspan><\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ COMMISSION FLOW ============ -->\n<sc-if value=\"{{ isCommission }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--bg);display:flex;flex-direction:column\">\n  <div style=\"background:var(--paper);border-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1000px;margin:0 auto;padding:22px clamp(20px,4vw,56px);display:flex;align-items:center;gap:clamp(6px,1.5vw,20px);overflow-x:auto\">\n      <sc-for list=\"{{ cSteps }}\" as=\"st\" hint-placeholder-count=\"5\">\n        <button sc-camel-on-click=\"{{ st.go }}\" style=\"display:flex;align-items:center;gap:11px;flex:none;background:none\">\n          <span style=\"width:30px;height:30px;flex:none;border-radius:50%;border:1px solid {{ st.bd }};background:{{ st.bg }};color:{{ st.col }};display:flex;align-items:center;justify-content:center;font:500 11px/1 var(--sans);transition:all .3s\">{{ st.num }}<\u002Fspan>\n          <span style=\"font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:{{ st.lab }};white-space:nowrap\">{{ st.label }}<\u002Fspan>\n        <\u002Fbutton>\n        <span style=\"flex:1;min-width:14px;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;justify-content:center;padding:clamp(36px,6vw,76px) clamp(20px,4vw,56px)\">\n    <div style=\"width:100%;max-width:880px;animation:auFade .5s ease both\">\n\n      <sc-if value=\"{{ step1 }}\" hint-placeholder-val=\"{{ true }}\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Passo 01 · L’Artista<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);margin:0 0 12px\">Scegli il tuo artista.<\u002Fh2>\n        <p style=\"font:400 16px/1.7 var(--sans);color:var(--ink2);margin:0 0 42px;max-width:56ch\">Ogni commissione inizia da una mano. Scegli la sensibilità che parla alla tua visione.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:16px\">\n          <sc-for list=\"{{ cArtists }}\" as=\"a\" hint-placeholder-count=\"6\">\n            <button sc-camel-on-click=\"{{ a.pick }}\" style=\"text-align:left;padding:24px;border:1px solid {{ a.bd }};background:{{ a.bg }};border-radius:3px;transition:border-color .3s,background .3s;position:relative\">\n              <sc-if value=\"{{ a.sel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:18px;right:18px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font:600 11px/1 var(--sans)\">✓<\u002Fspan><\u002Fsc-if>\n              <span style=\"display:block;font:500 10.5px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:12px\">{{ a.style }}<\u002Fspan>\n              <span style=\"display:block;font:400 1.5rem/1.1 var(--display);color:var(--ink);margin-bottom:10px\">{{ a.name }}<\u002Fspan>\n              <span style=\"display:block;font:400 13px/1.6 var(--sans);color:var(--ink3)\">{{ a.tagline }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Passo 02 · La Visione<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);margin:0 0 12px\">Descrivi la visione.<\u002Fh2>\n        <p style=\"font:400 16px/1.7 var(--sans);color:var(--ink2);margin:0 0 32px;max-width:56ch\">Scrivi la tua idea con parole tue. Il nostro studio interpreta l’intenzione, non le istruzioni — più emozione, meglio è.<\u002Fp>\n        <textarea value=\"{{ cDesc }}\" sc-camel-on-change=\"{{ setDesc }}\" placeholder=\"Un interno silenzioso all’alba, la luce che cade su una ciotola di limoni, alla maniera di Vermeer…\" style=\"width:100%;min-height:200px;resize:vertical;background:var(--card);border:1px solid var(--line);border-radius:3px;padding:22px;font:400 16px/1.7 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Ftextarea>\n        <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin:32px 0 14px\">Ti serve un inizio?<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ examples }}\" as=\"e\" hint-placeholder-count=\"3\"><button sc-camel-on-click=\"{{ e.use }}\" style=\"text-align:left;font:400 14.5px/1.5 var(--sans);color:var(--ink2);background:var(--card);border:1px solid var(--line2);border-radius:3px;padding:16px 18px;transition:border-color .3s\" style-hover=\"border-color:var(--accent);color:var(--ink)\">“{{ e.t }}”<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step3 }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Passo 03 · Riferimento<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);margin:0 0 12px\">Carica un riferimento.<\u002Fh2>\n        <p style=\"font:400 16px/1.7 var(--sans);color:var(--ink2);margin:0 0 32px;max-width:56ch\">Facoltativo, ma prezioso. Una fotografia, uno schizzo, un luogo — qualsiasi cosa dia radici all’idea.<\u002Fp>\n        <sc-if value=\"{{ cRef }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--accent);border-radius:3px;padding:18px\">\n            <div style=\"width:76px;height:76px;flex:none;background-color:#EEE7D8;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 12px);border-radius:2px\"><\u002Fdiv>\n            <div style=\"flex:1\"><span style=\"display:block;font:500 14px/1.3 var(--sans);color:var(--ink)\">{{ cRefName }}<\u002Fspan><span style=\"font:400 12px/1.4 var(--sans);color:var(--ink3)\">Riferimento caricato · 2,4 MB<\u002Fspan><\u002Fdiv>\n            <button sc-camel-on-click=\"{{ clearRef }}\" style=\"font:500 11px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)\" style-hover=\"color:var(--ink)\">Rimuovi<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noRef }}\" hint-placeholder-val=\"{{ true }}\">\n        <button sc-camel-on-click=\"{{ addRef }}\" style=\"width:100%;background:var(--card);border:1.5px dashed var(--line);border-radius:4px;padding:clamp(40px,7vw,72px) 24px;display:flex;flex-direction:column;align-items:center;gap:16px;transition:border-color .3s\" style-hover=\"border-color:var(--accent)\">\n          <span style=\"width:52px;height:52px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font:300 30px/1 var(--display);color:var(--accent)\">+<\u002Fspan>\n          <span style=\"font:400 clamp(1.1rem,1.6vw,1.35rem)/1.3 var(--display);color:var(--ink)\">Trascina un’immagine qui, oppure sfoglia<\u002Fspan>\n          <span style=\"font:400 12.5px/1.4 var(--sans);color:var(--ink3)\">JPG, PNG o TIFF · fino a 40 MB<\u002Fspan>\n        <\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Passo 04 · Interpretazione<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);margin:0 0 12px\">Scegli la tua interpretazione.<\u002Fh2>\n        <p style=\"font:400 16px/1.7 var(--sans);color:var(--ink2);margin:0 0 42px;max-width:56ch\">Quanto deve l’artista attenersi al proprio tratto distintivo?<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ styleOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ o.pick }}\" style=\"text-align:left;display:flex;align-items:center;gap:22px;padding:26px 28px;border:1px solid {{ o.bd }};background:{{ o.bg }};border-radius:3px;transition:border-color .3s,background .3s\">\n              <span style=\"width:22px;height:22px;flex:none;border-radius:50%;border:1.5px solid {{ o.bd }};display:flex;align-items:center;justify-content:center\"><sc-if value=\"{{ o.sel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:11px;height:11px;border-radius:50%;background:var(--accent)\"><\u002Fspan><\u002Fsc-if><\u002Fspan>\n              <span style=\"flex:1\"><span style=\"display:block;font:400 1.4rem/1.2 var(--display);color:var(--ink);margin-bottom:6px\">{{ o.name }}<\u002Fspan><span style=\"display:block;font:400 14px/1.55 var(--sans);color:var(--ink3)\">{{ o.desc }}<\u002Fspan><\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step5 }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Passo 05 · Anteprima<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4vw,3rem)/1.05 var(--display);margin:0 0 12px\">Rivedi e genera.<\u002Fh2>\n        <p style=\"font:400 16px/1.7 var(--sans);color:var(--ink2);margin:0 0 38px;max-width:56ch\">Un momento prima di comporre. Conferma gli elementi essenziali qui sotto.<\u002Fp>\n        <div style=\"background:var(--card);border:1px solid var(--line2);border-radius:3px;overflow:hidden;margin-bottom:26px\">\n          <sc-for list=\"{{ reviewRows }}\" as=\"row\" hint-placeholder-count=\"4\"><div style=\"display:flex;gap:20px;padding:20px 26px;border-bottom:1px solid var(--line2)\"><span style=\"flex:0 0 130px;font:500 11px/1.4 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)\">{{ row.k }}<\u002Fspan><span style=\"flex:1;font:400 15px/1.6 var(--sans);color:var(--ink)\">{{ row.v }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;background:rgba(167,138,94,.08);border:1px solid rgba(167,138,94,.28);border-radius:3px;padding:18px 22px\">\n          <span style=\"flex:none;width:20px;height:20px;border-radius:50%;border:1px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font:500 12px/1 var(--display);font-style:italic\">i<\u002Fspan>\n          <span style=\"font:400 13.5px/1.6 var(--sans);color:var(--bronze)\">Anteprima generata dall’IA a scopo dimostrativo. La commissione finale è realizzata a mano.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:sticky;bottom:0;background:var(--paper);border-top:1px solid var(--line);padding:16px clamp(20px,4vw,56px);z-index:5\">\n    <div style=\"max-width:880px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n      <button sc-camel-on-click=\"{{ cBack }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);padding:16px 10px\" style-hover=\"color:var(--ink)\">← Indietro<\u002Fbutton>\n      <sc-if value=\"{{ notLast }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-if value=\"{{ canContinue }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ cNext }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:18px 40px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Continua →<\u002Fbutton><\u002Fsc-if>\n        <sc-if value=\"{{ cantContinue }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:18px 40px;border-radius:2px;opacity:.32;cursor:default\">Continua →<\u002Fspan><\u002Fsc-if>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ step5 }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ generate }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--accent);color:#fff;padding:18px 40px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Genera Anteprima →<\u002Fbutton><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ AI PREVIEW ============ -->\n<sc-if value=\"{{ isPreview }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--bg)\">\n\n  <sc-if value=\"{{ generating }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"min-height:calc(100vh - 72px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center\">\n      <div style=\"width:64px;height:64px;border-radius:50%;border:1.5px solid var(--line);border-top-color:var(--accent);animation:auSpin 1s linear infinite;margin-bottom:34px\"><\u002Fdiv>\n      <span style=\"font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">In composizione<\u002Fspan>\n      <h2 style=\"font:300 clamp(1.8rem,3.5vw,2.8rem)/1.15 var(--display);margin:0 0 14px;max-width:20ch\">Elaborazione di tre concept su misura.<\u002Fh2>\n      <p style=\"font:400 15px/1.7 var(--sans);color:var(--ink3);margin:0;max-width:42ch\">Interpretiamo la tua visione attraverso la mano dell’artista — richiede un istante.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ generated }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1400px;margin:0 auto;padding:clamp(36px,6vw,72px) clamp(20px,4vw,56px);animation:auFade .6s ease both\">\n      <div style=\"text-align:center;margin-bottom:clamp(32px,4vw,52px)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">I Tuoi Concept<\u002Fspan>\n        <h2 style=\"font:300 clamp(2rem,4.4vw,3.3rem)/1.05 var(--display);margin:0 0 16px\">Tre interpretazioni, una visione.<\u002Fh2>\n        <p style=\"font:400 14px/1.6 var(--sans);color:var(--ink3);margin:0 auto;max-width:44ch\">Scegli il concept che ti emoziona. Potrai perfezionarlo nel passaggio successivo.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:clamp(18px,2vw,32px);margin-bottom:clamp(40px,5vw,64px)\">\n        <sc-for list=\"{{ concepts }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ c.pick }}\" style=\"text-align:left;background:var(--card);border:1px solid {{ c.bd }};border-radius:3px;overflow:hidden;transition:border-color .3s;position:relative\">\n            <div style=\"aspect-ratio:4/5;position:relative;background-color:#EAE2D2;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 15px);display:flex;align-items:center;justify-content:center\">\n              <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px;text-align:center\">Concept IA {{ c.n }}<\u002Fspan>\n              <sc-if value=\"{{ c.sel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font:600 13px/1 var(--sans)\">✓<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"padding:20px 22px;display:flex;align-items:baseline;justify-content:space-between;gap:10px\"><span style=\"font:400 1.4rem/1 var(--display);color:var(--ink)\">Concept {{ c.n }}<\u002Fspan><span style=\"font:400 12.5px/1.3 var(--sans);color:var(--ink3)\">{{ c.note }}<\u002Fspan><\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasConcept }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border-top:1px solid var(--line);padding-top:clamp(36px,4vw,56px);display:flex;flex-wrap:wrap;gap:clamp(28px,4vw,56px);animation:auFade .5s ease both\">\n          <div style=\"flex:1 1 320px;min-width:min(280px,100%)\">\n            <div style=\"aspect-ratio:4/5;position:relative;background-color:#EAE2D2;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 15px);display:flex;align-items:center;justify-content:center;border:1px solid var(--line2)\">\n              <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px\">Concept {{ selConceptLabel }} · Anteprima<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 380px;min-width:min(300px,100%)\">\n            <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:14px\">Perfeziona<\u002Fspan>\n            <h3 style=\"font:300 clamp(1.6rem,2.6vw,2.2rem)/1.1 var(--display);margin:0 0 30px\">Rendilo inconfondibilmente tuo.<\u002Fh3>\n            <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px\">Tavolozza Cromatica<\u002Fspan>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px\">\n              <sc-for list=\"{{ adjPalettes }}\" as=\"p\" hint-placeholder-count=\"4\"><button sc-camel-on-click=\"{{ p.pick }}\" style=\"display:flex;flex-direction:column;gap:8px;padding:10px;border:1px solid {{ p.bd }};border-radius:3px;transition:border-color .3s\"><span style=\"display:flex;border-radius:2px;overflow:hidden\"><sc-for list=\"{{ p.sw }}\" as=\"c\" hint-placeholder-count=\"4\"><span style=\"width:22px;height:22px;background:{{ c }}\"><\u002Fspan><\u002Fsc-for><\u002Fspan><span style=\"font:500 10px/1 var(--sans);letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)\">{{ p.name }}<\u002Fspan><\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:22px;margin-bottom:36px\">\n              <label style=\"display:block\"><span style=\"display:flex;justify-content:space-between;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:12px\"><span>Calore<\u002Fspan><span style=\"color:var(--ink3)\">{{ adjWarm }}<\u002Fspan><\u002Fspan><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ adjWarm }}\" sc-camel-on-change=\"{{ setWarm }}\" style=\"width:100%;accent-color:var(--accent)\"><\u002Flabel>\n              <label style=\"display:block\"><span style=\"display:flex;justify-content:space-between;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:12px\"><span>Luminosità<\u002Fspan><span style=\"color:var(--ink3)\">{{ adjBright }}<\u002Fspan><\u002Fspan><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ adjBright }}\" sc-camel-on-change=\"{{ setBright }}\" style=\"width:100%;accent-color:var(--accent)\"><\u002Flabel>\n              <label style=\"display:block\"><span style=\"display:flex;justify-content:space-between;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:12px\"><span>Contrasto<\u002Fspan><span style=\"color:var(--ink3)\">{{ adjContrast }}<\u002Fspan><\u002Fspan><input type=\"range\" min=\"0\" max=\"100\" value=\"{{ adjContrast }}\" sc-camel-on-change=\"{{ setContrast }}\" style=\"width:100%;accent-color:var(--accent)\"><\u002Flabel>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:14px;align-items:center\">\n              <button sc-camel-on-click=\"{{ toPurchase }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px 44px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Continua →<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ regenerate }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);border-bottom:1px solid var(--line);padding-bottom:6px\" style-hover=\"color:var(--accent);border-color:var(--accent)\">Rigenera<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ PURCHASE OPTIONS ============ -->\n<sc-if value=\"{{ isPurchase }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--bg)\">\n  <div style=\"max-width:1400px;margin:0 auto;padding:clamp(40px,6vw,84px) clamp(20px,4vw,56px)\">\n    <div style=\"text-align:center;margin-bottom:clamp(40px,5vw,64px)\">\n      <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Concept Approvato · {{ cArtistName }}<\u002Fspan>\n      <h2 style=\"font:300 clamp(2rem,4.4vw,3.3rem)/1.05 var(--display);margin:0 0 16px\">Scegli come ricevere la tua opera.<\u002Fh2>\n      <p style=\"font:400 15px/1.65 var(--sans);color:var(--ink3);margin:0 auto;max-width:48ch\">Ogni formato è prodotto su ordinazione, ispezionato a mano e consegnato con un certificato di autenticità.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:clamp(18px,2vw,30px);align-items:stretch\">\n      <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"3\">\n        <article style=\"display:flex;flex-direction:column;background:{{ f.bg }};border:1px solid {{ f.bd }};border-radius:4px;overflow:hidden;transition:border-color .3s,background .3s;position:relative\">\n          <sc-if value=\"{{ f.feat }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:16px;left:16px;z-index:2;font:500 10px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--accent);padding:8px 12px;border-radius:2px\">Il Più Scelto<\u002Fspan><\u002Fsc-if>\n          <div style=\"aspect-ratio:5/4;position:relative;background-color:#EAE2D2;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 15px);display:flex;align-items:center;justify-content:center\">\n            <span style=\"font:500 10px/1.4 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:#A79E8C;border:1px solid rgba(94,75,54,.2);padding:7px 11px\">{{ f.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:clamp(24px,2.4vw,34px);display:flex;flex-direction:column;flex:1\">\n            <h3 style=\"font:400 clamp(1.5rem,2vw,1.9rem)/1.1 var(--display);margin:0 0 6px\">{{ f.name }}<\u002Fh3>\n            <span style=\"font:400 13.5px/1.5 var(--sans);color:var(--ink3);margin-bottom:20px\">{{ f.tagline }}<\u002Fspan>\n            <span style=\"font:300 clamp(1.6rem,2.4vw,2.2rem)/1 var(--display);color:var(--ink);margin-bottom:22px\">{{ f.priceLabel }}<\u002Fspan>\n            <p style=\"font:400 14px/1.65 var(--sans);color:var(--ink2);margin:0 0 24px\">{{ f.blurb }}<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:28px;border-top:1px solid var(--line2);padding-top:22px\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"flex:none;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px\"><\u002Fspan><span style=\"font:400 13.5px/1.5 var(--sans);color:var(--ink2)\">{{ f.delivery }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"flex:none;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px\"><\u002Fspan><span style=\"font:400 13.5px/1.5 var(--sans);color:var(--ink2)\">{{ f.cert }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"flex:none;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px\"><\u002Fspan><span style=\"font:400 13.5px/1.5 var(--sans);color:var(--ink2)\">{{ f.time }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ f.sel }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-top:auto;text-align:center;font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--accent);color:#fff;padding:18px;border-radius:2px\">Selezionato ✓<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ f.notSel }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ f.pick }}\" style=\"margin-top:auto;font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--ink);border:1px solid var(--ink);padding:18px;border-radius:2px;transition:all .3s\" style-hover=\"background:var(--ink);color:var(--bg)\">Seleziona<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:center;margin-top:clamp(36px,4vw,56px)\">\n      <sc-if value=\"{{ purchaseReady }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ toCheckout }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px 52px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Prosegui al Pagamento →<\u002Fbutton><\u002Fsc-if>\n      <sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:400 14px/1 var(--sans);color:var(--ink3)\">Seleziona un formato per continuare<\u002Fspan><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ CHECKOUT ============ -->\n<sc-if value=\"{{ isCheckout }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--bg)\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:clamp(40px,6vw,80px) clamp(20px,4vw,56px)\">\n    <button sc-camel-on-click=\"{{ backToPurchase }}\" style=\"font:500 11px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:22px\" style-hover=\"color:var(--ink)\">← Opzioni d’acquisto<\u002Fbutton>\n    <h2 style=\"font:300 clamp(2rem,4.4vw,3.2rem)/1.05 var(--display);margin:0 0 clamp(36px,5vw,56px)\">Completa la tua commissione.<\u002Fh2>\n    <div style=\"display:flex;flex-wrap:wrap;gap:clamp(32px,4vw,64px);align-items:flex-start\">\n      <div style=\"flex:1 1 440px;min-width:min(300px,100%)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:26px\">Contatto<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:24px;margin-bottom:48px\">\n          <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Nome e Cognome<\u002Fspan><input value=\"{{ custName }}\" sc-camel-on-change=\"{{ setName }}\" placeholder=\"Alessandra Bianchi\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n          <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Email<\u002Fspan><input placeholder=\"tu@esempio.com\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n        <\u002Fdiv>\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:26px\">Spedizione<\u002Fspan>\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Indirizzo<\u002Fspan><input placeholder=\"Via della Spiga 24\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:24px\">\n            <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Città<\u002Fspan><input placeholder=\"Milano\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n            <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">CAP<\u002Fspan><input placeholder=\"20121\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n            <label style=\"display:block\"><span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Paese<\u002Fspan><input placeholder=\"Italia\" style=\"width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:12px 2px;font:400 16px/1.4 var(--sans);color:var(--ink);outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside style=\"flex:0 1 380px;min-width:min(300px,100%);position:sticky;top:96px;background:var(--paper);border:1px solid var(--line2);border-radius:4px;padding:clamp(26px,3vw,38px)\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:26px\">La Tua Commissione<\u002Fspan>\n        <div style=\"display:flex;gap:18px;padding-bottom:24px;border-bottom:1px solid var(--line2)\">\n          <div style=\"width:76px;height:92px;flex:none;background-color:#EAE2D2;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 12px);border-radius:2px\"><\u002Fdiv>\n          <div><span style=\"display:block;font:400 1.15rem/1.25 var(--display);color:var(--ink);margin-bottom:6px\">{{ summary.itemTitle }}<\u002Fspan><span style=\"display:block;font:400 12.5px/1.5 var(--sans);color:var(--ink3)\">{{ summary.artistStyle }} · {{ summary.conceptLabel }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;padding:24px 0;border-bottom:1px solid var(--line2)\">\n          <div style=\"display:flex;justify-content:space-between;gap:12px;font:400 14px/1.4 var(--sans)\"><span style=\"color:var(--ink3)\">Interpretazione<\u002Fspan><span style=\"color:var(--ink)\">{{ summary.styleLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:12px;font:400 14px/1.4 var(--sans)\"><span style=\"color:var(--ink3)\">Formato<\u002Fspan><span style=\"color:var(--ink)\">{{ summary.formatLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:12px;font:400 14px/1.4 var(--sans)\"><span style=\"color:var(--ink3)\">Certificato<\u002Fspan><span style=\"color:var(--ink)\">Incluso<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:24px 0 28px\"><span style=\"font:500 12px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2)\">Totale<\u002Fspan><span style=\"font:300 clamp(1.6rem,2.4vw,2rem)/1 var(--display);color:var(--ink)\">{{ summary.priceLabel }}<\u002Fspan><\u002Fdiv>\n        <button sc-camel-on-click=\"{{ placeOrder }}\" style=\"width:100%;font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Conferma l’Ordine<\u002Fbutton>\n        <p style=\"font:400 11.5px/1.6 var(--sans);color:var(--ink3);margin:16px 0 0;text-align:center\">Un pagamento dimostrativo — nessun addebito viene effettuato.<\u002Fp>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ ORDER CONFIRMATION ============ -->\n<sc-if value=\"{{ isConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--bg)\">\n  <div style=\"max-width:760px;margin:0 auto;padding:clamp(48px,7vw,96px) clamp(20px,4vw,56px);animation:auFade .6s ease both\">\n    <div style=\"text-align:center;margin-bottom:clamp(40px,5vw,60px)\">\n      <span style=\"display:inline-flex;align-items:center;justify-content:center;width:88px;height:88px;border-radius:50%;border:1.5px solid var(--accent);font:300 42px/1 var(--display);color:var(--accent);margin-bottom:30px\">✓<\u002Fspan>\n      <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:18px\">Commissione Confermata<\u002Fspan>\n      <h1 style=\"font:300 clamp(2.1rem,4.6vw,3.4rem)/1.08 var(--display);margin:0 0 16px;text-wrap:balance\">La tua opera è ora nelle mani dell’artista.<\u002Fh1>\n      <p style=\"font:400 15px/1.7 var(--sans);color:var(--ink2);margin:0\">Ordine <span style=\"color:var(--ink);font-family:var(--mono);letter-spacing:.04em\">{{ order.id }}<\u002Fspan> · confermato {{ order.date }}<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"background:var(--paper);border:1px solid var(--line2);border-radius:4px;padding:clamp(26px,3vw,36px);margin-bottom:clamp(32px,4vw,44px)\">\n      <div style=\"display:flex;gap:18px;padding-bottom:24px;border-bottom:1px solid var(--line2)\">\n        <div style=\"width:70px;height:86px;flex:none;background-color:#EAE2D2;background-image:repeating-linear-gradient(135deg,rgba(94,75,54,.06) 0 1px,transparent 1px 12px);border-radius:2px\"><\u002Fdiv>\n        <div style=\"flex:1\"><span style=\"display:block;font:400 1.2rem/1.25 var(--display);color:var(--ink);margin-bottom:6px\">{{ order.itemTitle }}<\u002Fspan><span style=\"display:block;font:400 12.5px/1.5 var(--sans);color:var(--ink3)\">{{ order.formatLabel }} · {{ order.styleLabel }}<\u002Fspan><\u002Fdiv>\n        <span style=\"font:300 1.4rem/1 var(--display);color:var(--ink);white-space:nowrap\">{{ order.priceLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin:24px 0 22px\">Tempistiche Previste<\u002Fspan>\n      <div style=\"display:flex;flex-direction:column\">\n        <sc-for list=\"{{ timeline }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;gap:18px\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;flex:none\">\n              <sc-if value=\"{{ t.done }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--accent)\"><\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ t.pending }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:14px;height:14px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line)\"><\u002Fspan><\u002Fsc-if>\n              <span style=\"width:1px;flex:1;min-height:22px;background:var(--line)\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding-bottom:20px\"><span style=\"display:block;font:400 15px/1.3 var(--ink);margin-bottom:3px\">{{ t.t }}<\u002Fspan><span style=\"font:400 12.5px/1.4 var(--sans);color:var(--ink3)\">{{ t.d }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <figure style=\"margin:0 0 clamp(36px,4vw,48px);text-align:center;padding:clamp(24px,3vw,36px);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n      <p style=\"font:300 clamp(1.3rem,2vw,1.7rem)/1.5 var(--display);font-style:italic;color:var(--ink);margin:0 0 18px;text-wrap:pretty\">“{{ artistMessage }}”<\u002Fp>\n      <figcaption style=\"font:500 11px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">— {{ order.artistName }}<\u002Ffigcaption>\n    <\u002Ffigure>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;justify-content:center\">\n      <button sc-camel-on-click=\"{{ toCertificate }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:20px 44px;border-radius:2px\" style-hover=\"background:var(--bronze)\">Vedi Certificato →<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ goHome }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);border-bottom:1px solid var(--line);padding:18px 6px\" style-hover=\"color:var(--accent);border-color:var(--accent)\">Torna alla Home<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ CERTIFICATE ============ -->\n<sc-if value=\"{{ isCert }}\" hint-placeholder-val=\"{{ false }}\">\n<main style=\"min-height:100vh;min-height:100svh;padding-top:72px;background:var(--ink)\">\n  <div style=\"max-width:820px;margin:0 auto;padding:clamp(40px,6vw,80px) clamp(20px,4vw,44px)\">\n    <div style=\"background:var(--bg);border:1px solid rgba(167,138,94,.4);padding:6px;animation:auFade .6s ease both\">\n      <div style=\"border:1px solid rgba(167,138,94,.35);padding:clamp(32px,6vw,72px) clamp(24px,5vw,64px);text-align:center\">\n        <span style=\"display:block;font:500 12px/1 var(--sans);letter-spacing:.32em;text-transform:uppercase;color:var(--accent);margin-bottom:8px\">Aurelia Fine Art<\u002Fspan>\n        <span style=\"display:block;font:600 15px/1 var(--sans);letter-spacing:.42em;color:var(--ink3);margin-bottom:clamp(28px,4vw,44px)\">EST. MMXXVI<\u002Fspan>\n        <h1 style=\"font:300 clamp(2rem,5vw,3.4rem)/1.05 var(--display);letter-spacing:.01em;margin:0 0 10px\">Certificato di Autenticità<\u002Fh1>\n        <p style=\"font:400 13px/1.6 var(--sans);color:var(--ink3);margin:0 auto clamp(32px,4vw,48px);max-width:46ch\">Questo documento certifica la commissione qui indicata come originale unico, realizzato a mano dall’atelier A
