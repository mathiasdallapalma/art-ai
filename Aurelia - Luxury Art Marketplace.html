urelia.<\u002Fp>\n\n        <div style=\"height:1px;background:linear-gradient(to right,transparent,rgba(167,138,94,.5),transparent);margin-bottom:clamp(32px,4vw,44px)\"><\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:clamp(22px,3vw,34px);text-align:left;margin-bottom:clamp(36px,4vw,52px)\">\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Opera<\u002Fspan><span style=\"font:400 1.25rem/1.3 var(--display);color:var(--ink)\">{{ cert.artwork }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Artista<\u002Fspan><span style=\"font:400 1.25rem/1.3 var(--display);color:var(--ink)\">{{ cert.artist }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Proprietario<\u002Fspan><span style=\"font:400 1.25rem/1.3 var(--display);color:var(--ink)\">{{ cert.owner }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Data di Emissione<\u002Fspan><span style=\"font:400 1.25rem/1.3 var(--display);color:var(--ink)\">{{ cert.date }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Tecnica<\u002Fspan><span style=\"font:400 1.25rem/1.3 var(--display);color:var(--ink)\">{{ cert.medium }}<\u002Fspan><\u002Fdiv>\n          <div><span style=\"display:block;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px\">Riferimento Univoco<\u002Fspan><span style=\"font:500 1rem/1.3 var(--mono);letter-spacing:.06em;color:var(--ink)\">{{ cert.id }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:28px;margin-top:clamp(20px,3vw,36px)\">\n          <div style=\"text-align:left;flex:1 1 220px\">\n            <span style=\"display:block;font:400 clamp(1.9rem,3.5vw,2.8rem)/1 var(--display);font-style:italic;color:var(--ink);margin-bottom:12px\">{{ cert.signature }}<\u002Fspan>\n            <span style=\"display:block;border-top:1px solid var(--line);padding-top:10px;font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)\">Firmato dall’Artista<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:none;width:104px;height:104px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center\">\n            <div style=\"width:84px;height:84px;border-radius:50%;border:1px solid rgba(167,138,94,.5);display:flex;flex-direction:column;align-items:center;justify-content:center\">\n              <span style=\"font:400 34px/1 var(--display);color:var(--accent)\">A<\u002Fspan>\n              <span style=\"font:500 7px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-top:3px\">Autenticato<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:32px\">\n      <button sc-camel-on-click=\"{{ printCert }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;background:var(--accent);color:#fff;padding:18px 40px;border-radius:2px\" style-hover=\"background:#fff;color:var(--ink)\">Scarica / Stampa<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ goHome }}\" style=\"font:500 12px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:rgba(245,241,232,.7);border-bottom:1px solid rgba(245,241,232,.3);padding:16px 6px\" style-hover=\"color:#fff;border-color:#fff\">Torna alla Home<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!--/screens-->\n\n<!-- ============ FOOTER ============ -->\n<sc-if value=\"{{ showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n<footer style=\"background:var(--ink);color:var(--bg);padding:clamp(56px,8vh,96px) clamp(20px,4vw,56px) 40px\">\n  <div style=\"max-width:1400px;margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(200px,100%),1fr));gap:clamp(36px,4vw,64px);padding-bottom:clamp(40px,5vw,64px);border-bottom:1px solid rgba(245,241,232,.14)\">\n      <div style=\"min-width:200px\">\n        <div style=\"font:600 22px/1 var(--sans);letter-spacing:.34em;margin-bottom:22px\">AURELIA<\u002Fdiv>\n        <p style=\"font:400 14px/1.7 var(--sans);color:rgba(245,241,232,.6);margin:0;max-width:34ch\">Arte su commissione dalle mani più distintive al mondo. Ogni opera, un originale.<\u002Fp>\n      <\u002Fdiv>\n      <sc-for list=\"{{ footerCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div>\n          <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">{{ c.head }}<\u002Fspan>\n          <div style=\"display:flex;flex-direction:column;gap:13px\">\n            <sc-for list=\"{{ c.items }}\" as=\"i\" hint-placeholder-count=\"4\"><a style=\"cursor:pointer;font:400 14px/1 var(--sans);color:rgba(245,241,232,.72)\" style-hover=\"color:var(--bg)\">{{ i }}<\u002Fa><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"min-width:220px\">\n        <span style=\"display:block;font:500 11px/1 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px\">L’Anteprima Privata<\u002Fspan>\n        <p style=\"font:400 14px/1.6 var(--sans);color:rgba(245,241,232,.6);margin:0 0 16px\">Un discreto notiziario su nuove commissioni e maestri.<\u002Fp>\n        <div style=\"display:flex;border-bottom:1px solid rgba(245,241,232,.3);padding-bottom:10px\"><input placeholder=\"La tua email\" style=\"flex:1;background:none;border:none;outline:none;color:var(--bg);font:400 14px/1 var(--sans)\"><button style=\"font:500 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">Iscriviti<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;padding-top:28px;font:400 12px/1.5 var(--sans);color:rgba(245,241,232,.5)\">\n      <span>© 2026 Aurelia Fine Art. Un prototipo dimostrativo.<\u002Fspan>\n      <span style=\"display:flex;gap:24px;flex-wrap:wrap\"><a style=\"cursor:pointer\">Termini<\u002Fa><a style=\"cursor:pointer\">Privacy<\u002Fa><a style=\"cursor:pointer\">Provenienza<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Oro Tenue&quot;,&quot;Bronzo Antico&quot;,&quot;Carbone Scuro&quot;],&quot;default&quot;:&quot;Oro Tenue&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Tema&quot;},&quot;showPrice&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Tema&quot;},&quot;grain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Tema&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen:'home', scrolled:false, mobileNav:false, vw: (typeof window!=='undefined'?window.innerWidth:1200),\n    artistId:0, faqOpen:0,\n    cStep:1, cArtist:null, cDesc:'', cRef:false, cRefName:'', cStyle:'',\n    generating:false, generated:false, concept:null,\n    adjPalette:0, adjWarm:52, adjBright:50, adjContrast:48,\n    format:null, custName:'', placed:false, certId:'', certDate:''\n  };\n\n  get artists(){ return [\n    {id:0,name:'Vincent van Gogh',style:'Post-Impressionismo',place:'Arles, Francia',era:1888,medium:'Olio su tela',\n      tagline:'Emozione resa in un impasto irrequieto e luminoso — colore che sembra muoversi da sé.',\n      bio:'Van Gogh traduce la propria inquietudine interiore in pigmento, stendendo il colore con pennellate spesse e decise che portano con sé il clima di uno stato d’animo. Ogni tela è un registro del sentire tanto quanto del luogo — il campo, la stanza, il volto, tutti carichi della stessa attenzione elettrica.',\n      philosophy:'Sogno il mio dipinto, e poi dipingo il mio sogno. Ciò che è fatto con amore è fatto bene — e il resto è soltanto tempo che passa.',\n      tags:['Impasto','Colore espressivo','Paesaggio','Ritrattistica'],\n      works:['Cipresso al crepuscolo','Campo di grano, mutevole','Ramo di mandorlo, studio','La casa color ocra','Iris, secondo stato','Uliveto nel maestrale','Interno, caffè a tarda ora','Mietitore a mezzogiorno','Ritratto di uno sconosciuto']},\n    {id:1,name:'Claude Monet',style:'Impressionismo',place:'Giverny, Francia',era:1899,medium:'Olio su tela',\n      tagline:'Luce e acqua dissolte in pura sensazione — un mondo colto nell’atto di mutare.',\n      bio:'Monet dipinge non l’oggetto ma la luce che vi si posa, tornando allo stesso motivo attraverso ore e stagioni finché il soggetto diventa quasi accessorio. I suoi giardini tardi dissolvono del tutto l’orizzonte, lasciando colore, riflesso e tempo.',\n      philosophy:'Voglio dipingere l’aria in cui si trovano il ponte, la casa, la barca — la bellezza dell’aria, e questo non è altro che impossibile.',\n      tags:['En plein air','Riflesso','Serie','Atmosfera'],\n      works:['Ninfea, mattino','Il ponte, luce verde','Pagliaio, settembre','Riflessi a Giverny','Pioppi nel vento','Rouen, ora grigia','Mare a Étretat','Il sentiero del giardino','Nebbia sull’acqua']},\n    {id:2,name:'Katsushika Hokusai',style:'Xilografia Ukiyo-e',place:'Edo, Giappone',era:1831,medium:'Xilografia, inchiostro e colore',\n      tagline:'Il mondo fluttuante inciso in linea e onda — la natura resa monumentale attraverso la misura.',\n      bio:'Hokusai compone il vasto e l’intimo in un solo respiro, lasciando che un ricciolo di schiuma o una montagna lontana reggano l’intero peso di una scena. La sua linea è esatta, il suo colore misurato, il suo senso del disegno secoli avanti al proprio tempo.',\n      philosophy:'Fin dall’età di sei anni ho avuto la mania di disegnare la forma delle cose. A settantatré ho cominciato a cogliere la vera struttura della natura.',\n      tags:['Linea','Xilografia','Natura','Composizione'],\n      works:['L’onda che si leva','Il Fuji oltre i pini','Ponte sotto la pioggia','Carpa che risale','La rete del pescatore','Tempesta al largo del capo','Fuji rosso all’alba','Viandanti, passo di montagna','Gru sopra i canneti']},\n    {id:3,name:'Johannes Vermeer',style:'Secolo d’oro olandese',place:'Delft, Paesi Bassi',era:1665,medium:'Olio su tela',\n      tagline:'Luce del nord tenuta in perfetta quiete — l’ordinario reso sacro dall’attenzione.',\n      bio:'Vermeer costruisce il silenzio a partire dalla luce, disponendo una singola figura in una stanza finché l’intera composizione trattiene il fiato. Ogni superficie — perla, lino, intonaco, vetro — è osservata con una pazienza quasi devota.',\n      philosophy:'La luce non cade sul soggetto; il soggetto è composto a partire dalla luce.',\n      tags:['Chiaroscuro','Interni','Quiete','Realismo'],\n      works:['Fanciulla alla finestra','Lettera, incompiuta','La brocca del latte','Donna con liuto','Luce da nord','Il tavolo del geografo','Perla, uno studio','Interno con mappa','Le mani della merlettaia']},\n    {id:4,name:'J.M.W. Turner',style:'Romanticismo',place:'Londra, Inghilterra',era:1840,medium:'Olio e acquerello',\n      tagline:'Tempesta, vapore e sole al limite dell’astrazione — il sublime dissolto in pura luce.',\n      bio:'Turner spinge il paesaggio al limite della leggibilità, annegando navi e città in un vapore radioso. Decenni prima dell’astrazione, comprese che la luce stessa poteva essere il soggetto, il dramma e il significato di un quadro.',\n      philosophy:'L’atmosfera è il mio stile. L’indistinto non è un difetto — è la verità di come l’occhio riceve il mondo.',\n      tags:['Sublime','Luce','Marina','Atmosfera'],\n      works:['Vapore e velocità','Porto, cielo in fiamme','Il sole combattente','Tempesta di neve in mare','Venezia che si dissolve','Pioggia, vapore','Norham all’alba','La nave degli schiavi, studio','Luce sull’acqua']},\n    {id:5,name:'Gustav Klimt',style:'Secessione Viennese',place:'Vienna, Austria',era:1907,medium:'Olio e foglia d’oro',\n      tagline:'Ornamento e oro, il desiderio reso decorativo — la figura fusa con motivo e luce.',\n      bio:'Klimt colloca la figura umana entro campi scintillanti di ornamento e foglia d’oro, annullando la distanza tra ritratto e icona. La sua opera è insieme sensuale e severa, tenera e monumentale, intima ed eterna.',\n      philosophy:'Chi vuole sapere qualcosa di me dovrebbe guardare con attenzione i miei quadri — tutta la verità che possiedo è lì.',\n      tags:['Foglia d’oro','Ornamento','Simbolismo','Ritrattistica'],\n      works:['Ritratto in oro','L’abbraccio','Bosco di faggi, autunno','Studio dorato I','Ornamento, un pannello','Danae, pioggia d’oro','Albero della vita','Serpenti d’acqua','Adele, secondo studio']}\n  ]; }\n\n  buildArtworks(a){\n    const dims=['92 × 73 cm','116 × 89 cm','61 × 50 cm','130 × 97 cm','73 × 60 cm','100 × 81 cm','81 × 65 cm','146 × 114 cm','65 × 54 cm'];\n    const prices=[26000,41000,18500,48000,13500,31000,22500,44000,11000];\n    const yr=[0,-1,2,-3,1,-2,3,-1,0];\n    const ratios=['4/5','3/4','1/1','4/5','3/4','1/1','5/6','4/5','3/4'];\n    return a.works.map((t,i)=>({ id:a.id+'-'+i, artistId:a.id, artist:a.name, title:t, medium:a.medium, dim:dims[i%9], year:a.era+yr[i%9], price:prices[i%9], ratio:ratios[i%9] }));\n  }\n\n  fmt(v){ return (this.props.showPrice!==false) ? '€'+Number(v).toLocaleString('it-IT') : 'Prezzo su richiesta'; }\n\n  get testimonials(){ return [\n    {quote:'Aurelia non mi ha venduto un quadro. Mi ha regalato un dialogo con un maestro, e un dipinto che poteva essere solo mio.',name:'Isabelle Laurent',role:'Collezionista privata · Parigi'},\n    {quote:'Il processo di anteprima è straordinario — ho capito esattamente cosa stavo commissionando prima ancora di un solo tocco di pennello. Impeccabile.',name:'Henry Okafor',role:'Fondatore · Londra'},\n    {quote:'Più che un acquisto, è sembrata un’anteprima privata. Il certificato ora è appeso accanto all’opera stessa.',name:'Sofia Marchetti',role:'Architetto d’interni · Milano'}\n  ]; }\n\n  get howSteps(){ return [\n    {n:'01',title:'Scegli il tuo artista',desc:'Studia la mano e la filosofia di ogni maestro, poi scegli la sensibilità che parla alla tua visione.'},\n    {n:'02',title:'Descrivi la visione',desc:'Scrivi la tua idea con parole tue e aggiungi un riferimento. Il nostro studio interpreta l’intenzione, non le istruzioni.'},\n    {n:'03',title:'Anteprima e perfezionamento',desc:'Ricevi tre concept su misura in pochi minuti. Regola tavolozza, atmosfera e luce finché non è inconfondibilmente tua.'},\n    {n:'04',title:'Ricevi l’originale',desc:'Approva, scegli il formato e ricevi un’opera rifinita a mano con il suo certificato di autenticità.'}\n  ]; }\n\n  get faqData(){ return [\n    {q:'Come diventa un’anteprima IA un’opera d’arte originale?',a:'L’anteprima serve solo ad allineare la visione. Una volta approvato un concept, l’artista scelto o il suo atelier realizza l’opera a mano nella tecnica prescelta — l’anteprima è un brief, mai l’opera finale. In questo prototipo, le anteprime sono pre-generate a scopo dimostrativo.'},\n    {q:'Ogni commissione è davvero originale?',a:'Sì. Ogni commissione è realizzata come opera unica e accompagnata da un certificato di autenticità firmato che riporta artista, proprietario e un riferimento univoco. Nessuna commissione viene mai riprodotta o rivenduta.'},\n    {q:'Quali sono le tempistiche tipiche?',a:'I master digitali vengono consegnati in due o tre settimane. Le stampe fine art e gli originali rifiniti a mano richiedono da quattro a sei settimane a seconda di tecnica, dimensioni e incorniciatura.'},\n    {q:'Come vengono consegnate e protette le opere?',a:'Ogni opera fisica viene spedita in tutto il mondo, interamente assicurata, in imballaggi archivistici su misura, con installazione white-glove disponibile in città selezionate.'}\n  ]; }\n\n  get footerCols(){ return [\n    {head:'Esplora',items:['Artisti','Commissioni','Stampe Fine Art','Il Giornale']},\n    {head:'La Maison',items:['Chi è Aurelia','Provenienza','Lavora con noi','Stampa']},\n    {head:'Assistenza Clienti',items:['Contatti','Spedizioni','Autenticità','Consulenza Privata']}\n  ]; }\n\n  get reviews(){ return [\n    {name:'Charlotte Devereux',role:'Collezionista · Londra',rating:5,text:'Una commissione oltre ogni aspettativa. La fedeltà allo stile è sorprendente e la rifinitura è da museo.'},\n    {name:'Rafael Costa',role:'Architetto · Lisbona',rating:5,text:'Dalla richiesta alla consegna, l’esperienza è stata curata quanto l’opera stessa. Impeccabile.'},\n    {name:'Mei Lin',role:'Cliente privato · Singapore',rating:4,text:'L’anteprima mi ha dato piena fiducia. L’opera finale è ora il fulcro della nostra intera collezione.'}\n  ]; }\n\n  get formatsData(){ return [\n    {id:'digital',name:'Opera Digitale',price:5900,tagline:'Un master firmato, ad alta risoluzione.',blurb:'Un master digitale di qualità archivistica, firmato e consegnato per l’esposizione privata e la stampa a tua discrezione.',delivery:'Download sicuro immediato',cert:'Certificato ancorato digitalmente',time:'Pronto in 2–3 settimane'},\n    {id:'print',name:'Stampa Fine Art',price:9500,tagline:'Giclée da museo, in edizione.',blurb:'Giclée rifinita a mano su carta 100% cotone, in edizione e ispezionata dall’atelier prima della consegna.',delivery:'Spedizione assicurata in tutto il mondo',cert:'Certificato di autenticità firmato',time:'Prodotta in 4–5 settimane',featured:true},\n    {id:'canvas',name:'Originale su Tela',price:7400,tagline:'Montata su telaio e verniciata.',blurb:'Montata su tela archivistica e verniciata secondo le indicazioni dell’artista — pronta da appendere.',delivery:'Spedizione assicurata in tutto il mondo',cert:'Certificato di autenticità firmato',time:'Prodotta in 5–6 settimane'}\n  ]; }\n\n  get timeline(){ return [\n    {t:'Commissione ricevuta',d:'Oggi',done:true},\n    {t:'Revisione e accettazione dell’artista',d:'Entro 3 giorni'},\n    {t:'Inizio della produzione a mano',d:'Settimane 1–4'},\n    {t:'Ispezione e incorniciatura',d:'Settimana 5'},\n    {t:'Consegna assicurata',d:'Settimana 6'}\n  ]; }\n\n  // ---- navigation ----\n  go=(screen,extra={})=>{ this.setState({screen,mobileNav:false,...extra}); if(typeof window!=='undefined') window.scrollTo({top:0,behavior:'auto'}); };\n  goHome=()=>this.go('home');\n  openNav=()=>this.setState({mobileNav:true});\n  closeNav=()=>this.setState({mobileNav:false});\n  viewArtist=(id)=>this.go('artist',{artistId:id});\n  scrollToId=(id)=>{ const el=document.getElementById(id); if(el){ const y=el.getBoundingClientRect().top+window.scrollY-64; window.scrollTo({top:y,behavior:'smooth'}); } };\n  browse=()=>{ if(this.state.screen!=='home'){ this.go('home'); setTimeout(()=>this.scrollToId('featured'),90);} else this.scrollToId('featured'); };\n  gotoHow=()=>{ if(this.state.screen!=='home'){ this.go('home'); setTimeout(()=>this.scrollToId('how'),90);} else this.scrollToId('how'); };\n  createAI=()=>this.startCommission();\n  startCommission=(artistId=null)=>{ this.go('commission',{cStep: artistId!=null?2:1, cArtist: artistId!=null?artistId:this.state.cArtist}); };\n  toggleFaq=(i)=>this.setState(s=>({faqOpen:s.faqOpen===i?-1:i}));\n\n  // ---- commission ----\n  canContinue=()=>{ const s=this.state; if(s.cStep===1) return s.cArtist!=null; if(s.cStep===2) return s.cDesc.trim().length>0; if(s.cStep===4) return !!s.cStyle; return true; };\n  cNext=()=>{ if(this.state.cStep>=5) return; if(this.canContinue()) this.setState(s=>({cStep:s.cStep+1})); };\n  cBack=()=>{ if(this.state.cStep<=1){ this.go('home'); return; } this.setState(s=>({cStep:s.cStep-1})); };\n  cGoto=(n)=>{ if(n<this.state.cStep) this.setState({cStep:n}); };\n  setDesc=(e)=>this.setState({cDesc:e.target.value});\n  useExample=(t)=>this.setState({cDesc:t});\n  addRef=()=>this.setState({cRef:true,cRefName:'riferimento-studio.jpg'});\n  clearRef=()=>this.setState({cRef:false,cRefName:''});\n  pickArtist=(id)=>this.setState({cArtist:id});\n  pickStyle=(id)=>this.setState({cStyle:id});\n\n  // ---- ai preview ----\n  generate=()=>{ this.setState({generating:true,generated:false,concept:null}); this.go('aipreview'); clearTimeout(this._gt); this._gt=setTimeout(()=>this.setState({generating:false,generated:true,concept:0}),2500); };\n  selectConcept=(i)=>this.setState({concept:i});\n  setAdj=(k,v)=>this.setState({[k]:Number(v)});\n  pickAdjPalette=(i)=>this.setState({adjPalette:i});\n\n  // ---- purchase / checkout ----\n  chooseFormat=(id)=>this.setState({format:id});\n  setName=(e)=>this.setState({custName:e.target.value});\n  placeOrder=()=>{ const id='AUR-2026-'+Math.random().toString(36).slice(2,8).toUpperCase(); const d=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'}); this.setState({placed:true,certId:id,certDate:d}); this.go('confirmation'); };\n\n  componentDidMount(){\n    this._scroll=()=>{ const sc=window.scrollY>36; if(sc!==this.state.scrolled) this.setState({scrolled:sc}); if(this._hero) this._hero.style.transform='translateY('+Math.min(window.scrollY*0.16,110)+'px)'; };\n    this._resize=()=>{ if(Math.abs(window.innerWidth-this.state.vw)>0) this.setState({vw:window.innerWidth}); };\n    window.addEventListener('scroll',this._scroll,{passive:true});\n    window.addEventListener('resize',this._resize);\n  }\n  componentWillUnmount(){ window.removeEventListener('scroll',this._scroll); window.removeEventListener('resize',this._resize); clearTimeout(this._gt); }\n\n  renderVals(){\n    const s=this.state, p=this.props;\n    const accent = {'Oro Tenue':'#A78A5E','Bronzo Antico':'#8A6B45','Carbone Scuro':'#3A352E'}[p.accent] || '#A78A5E';\n    const grain = p.grain!==false;\n    const isMobile = s.vw < 900;\n    const transparentNav = (s.screen==='home'||s.screen==='artist') && !s.scrolled && !s.mobileNav;\n\n    const navLinks = [\n      {label:'Home',on:this.goHome},\n      {label:'Artisti',on:this.browse},\n      {label:'Commissioni',on:this.createAI},\n      {label:'Chi siamo',on:this.gotoHow}\n    ];\n\n    const featuredArtists = this.artists.slice(0,3).map(a=>({ ...a, view:()=>this.viewArtist(a.id), commission:()=>this.startCommission(a.id) }));\n\n    // home gallery — a curated mix\n    const gal=[];\n    [0,5,2,1,3,4].forEach(ai=>{ const ws=this.buildArtworks(this.artists[ai]); gal.push(ws[0]); gal.push(ws[3]); });\n    const galRatios=['3/4','4/5','1/1','5/6','3/4','4/5','1/1','3/4','4/5','5/6','1/1','3/4'];\n    const gallery = gal.slice(0,9).map((w,i)=>({ title:w.title, artist:w.artist, priceLabel:this.fmt(w.price), ratio:galRatios[i], slot:'Opera · '+w.medium.split(',')[0], open:()=>this.viewArtist(w.artistId) }));\n\n    const faqs = this.faqData.map((f,i)=>({ ...f, open:s.faqOpen===i, rot:s.faqOpen===i?'rotate(45deg)':'rotate(0deg)', toggle:()=>this.toggleFaq(i) }));\n\n    // ---- artist profile ----\n    const A = this.artists[s.artistId] || this.artists[0];\n    const artistWorks = this.buildArtworks(A).map(w=>({ ...w, priceLabel:this.fmt(w.price), slot:'Opera · '+w.medium.split(',')[0],\n      buyDigital:()=>{ this.setState({cArtist:A.id,format:'digital',concept:null}); this.go('purchase'); },\n      finePrint:()=>{ this.setState({cArtist:A.id,format:'print',concept:null}); this.go('purchase'); },\n      commission:()=>this.startCommission(A.id) }));\n    const reviews = this.reviews.map(r=>({ name:r.name, role:r.role, text:r.text, dots:[0,1,2,3,4].map(i=>({on:i<r.rating,off:i>=r.rating})) }));\n    const artistCommission = ()=>this.startCommission(A.id);\n\n    // ---- commission ----\n    const cArtistObj = s.cArtist!=null ? this.artists[s.cArtist] : null;\n    const cArtists = this.artists.map(a=>{ const sel=s.cArtist===a.id; return { id:a.id, name:a.name, style:a.style, tagline:a.tagline, sel, bd:sel?accent:'rgba(33,30,25,.12)', bg:sel?'rgba(167,138,94,.07)':'var(--card)', pick:()=>this.pickArtist(a.id) }; });\n    const cSteps = [{n:1,label:'Artista'},{n:2,label:'Visione'},{n:3,label:'Riferimento'},{n:4,label:'Stile'},{n:5,label:'Anteprima'}].map(st=>{ const active=st.n===s.cStep, done=st.n<s.cStep; return { n:st.n, num:('0'+st.n).slice(-2), label:st.label, active, done, go:()=>this.cGoto(st.n), bg:(active||done)?accent:'transparent', col:(active||done)?'#fff':'#8B857C', bd:(active||done)?accent:'rgba(33,30,25,.2)', lab:active?'var(--ink)':(done?'var(--ink2)':'var(--ink3)') }; });\n    const examples = ['Un porto invernale alle prime luci, vele gravide di nebbia — nello spirito di Turner.','Il giardino di mia nonna a Giverny, glicini sopra acqua immobile, tardo pomeriggio.','Un ritratto di mia figlia, dorato e ornamentale, lo sguardo rivolto alla luce.'].map(t=>({ t, use:()=>this.useExample(t) }));\n    const styleOptions = [{id:'faithful',name:'Molto Fedele',desc:'Uno studio ravvicinato e rispettoso, reso con la mano e la tavolozza dell’artista.'},{id:'inspired',name:'Ispirato',desc:'Il tuo soggetto visto attraverso la sensibilità dell’artista — familiare, eppure trasformato.'},{id:'creative',name:'Reinterpretazione Creativa',desc:'Una deviazione audace e originale. L’artista, libero sulla tua idea.'}].map(o=>{ const sel=s.cStyle===o.id; return { id:o.id, name:o.name, desc:o.desc, sel, bd:sel?accent:'rgba(33,30,25,.12)', bg:sel?'rgba(167,138,94,.07)':'var(--card)', pick:()=>this.pickStyle(o.id) }; });\n\n    // ---- ai preview ----\n    const concepts = [{n:'I',note:'Interpretazione fedele'},{n:'II',note:'Composizione equilibrata'},{n:'III',note:'Variazione espressiva'}].map((c,i)=>{ const sel=s.concept===i; return { n:c.n, note:c.note, idx:i, sel, bd:sel?accent:'rgba(33,30,25,.12)', pick:()=>this.selectConcept(i) }; });\n    const adjPalettes = [{name:'Come Generato',sw:['#c9b8a0','#8f7250','#4a3b2c','#e8dcc8']},{name:'Ora Dorata',sw:['#e6c89a','#c99b5f','#7a5a34','#f2e6cf']},{name:'Notturno',sw:['#3a4a5e','#5a6b82','#26303f','#c7cdd8']},{name:'Verdeggiante',sw:['#7d8c6a','#556149','#2f3a28','#cdd3bd']}].map((pl,i)=>{ const sel=s.adjPalette===i; return { name:pl.name, sw:pl.sw, sel, bd:sel?accent:'rgba(33,30,25,.12)', pick:()=>this.pickAdjPalette(i) }; });\n    const selConceptLabel = s.concept!=null ? ['I','II','III'][s.concept] : 'I';\n\n    // ---- purchase / summary ----\n    const formats = this.formatsData.map(f=>{ const sel=s.format===f.id; return { ...f, priceLabel:this.fmt(f.price), sel, notSel:!sel, feat:!!f.featured, bd:sel?accent:'rgba(33,30,25,.12)', bg:sel?'rgba(167,138,94,.06)':'var(--card)', pick:()=>this.chooseFormat(f.id) }; });\n    const fmtObj = formats.find(f=>f.id===s.format) || null;\n    const artistName = cArtistObj ? cArtistObj.name : 'L’Atelier Aurelia';\n    const styleLabel = {faithful:'Molto Fedele',inspired:'Ispirato',creative:'Reinterpretazione Creativa'}[s.cStyle] || 'Ispirato';\n    const today = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});\n    const summary = { artistName, artistStyle: cArtistObj?cArtistObj.style:'Studio su commissione', itemTitle:'Commissione su misura · da '+artistName, conceptLabel:'Concept '+selConceptLabel, styleLabel, formatLabel: fmtObj?fmtObj.name:'—', priceLabel: fmtObj?fmtObj.priceLabel:'—' };\n    const reviewRows = [{k:'Artista',v:artistName},{k:'La tua visione',v:(s.cDesc.trim()||'—')},{k:'Riferimento',v:(s.cRef?s.cRefName:'Nessuno fornito')},{k:'Interpretazione',v:styleLabel}];\n\n    return {\n      accent, grain, mobile:isMobile, desktop:!isMobile, mobileNav:s.mobileNav,\n      navBg: transparentNav?'transparent':'rgba(250,247,240,.85)',\n      navBorder: transparentNav?'rgba(0,0,0,0)':'rgba(33,30,25,.10)',\n      navBlur: transparentNav?'none':'saturate(1.3) blur(16px)',\n      isHome: s.screen==='home',\n      showChrome: s.screen==='home'||s.screen==='artist',\n      goHome:this.goHome, openNav:this.openNav, closeNav:this.closeNav, navLinks,\n      browse:this.browse, createAI:this.createAI, heroRef:(el)=>{this._hero=el;},\n      featuredArtists, gallery, howSteps:this.howSteps, testimonials:this.testimonials, faqs, footerCols:this.footerCols,\n      isArtist:s.screen==='artist', artist:A, artistTags:A.tags, artistWorks, reviews, artistCommission,\n      isCommission:s.screen==='commission', cStep:s.cStep, cSteps, cArtists, cArtistObj, examples, styleOptions, noRef:!s.cRef, reviewRows,\n      cDesc:s.cDesc, cRef:s.cRef, cRefName:s.cRefName,\n      step1:s.cStep===1, step2:s.cStep===2, step3:s.cStep===3, step4:s.cStep===4, step5:s.cStep===5,\n      notLast:s.cStep<5, cantContinue:!this.canContinue(), canContinue:this.canContinue(), cNext:this.cNext, cBack:this.cBack, setDesc:this.setDesc, addRef:this.addRef, clearRef:this.clearRef, generate:this.generate,\n      isPreview:s.screen==='aipreview', generating:s.generating, generated:s.generated, concept:s.concept, hasConcept:s.concept!=null, selConceptLabel,\n      concepts, adjPalettes, adjWarm:s.adjWarm, adjBright:s.adjBright, adjContrast:s.adjContrast,\n      setWarm:(e)=>this.setAdj('adjWarm',e.target.value), setBright:(e)=>this.setAdj('adjBright',e.target.value), setContrast:(e)=>this.setAdj('adjContrast',e.target.value),\n      regenerate:this.generate, toPurchase:()=>this.go('purchase'),\n      isPurchase:s.screen==='purchase', formats, purchaseReady:s.format!=null, notReady:s.format==null, toCheckout:()=>{ if(this.state.format!=null) this.go('checkout'); }, cArtistName:artistName,\n      isCheckout:s.screen==='checkout', summary, custName:s.custName, setName:this.setName, placeOrder:this.placeOrder, backToPurchase:()=>this.go('purchase'),\n      isConfirm:s.screen==='confirmation', order:{ ...summary, id:s.certId, date:s.certDate }, timeline:this.timeline.map(t=>({...t,pending:!t.done})), artistMessage:'Grazie per avermi affidato la tua visione. La dipingerò come fosse mia — con pazienza, e con gioia.', toCertificate:()=>this.go('certificate'),\n      isCert:s.screen==='certificate', cert:{ artwork:summary.itemTitle, artist:artistName, owner:(s.custName.trim()||'Il Collezionista'), date:s.certDate||today, id:s.certId||'AUR-2026-PREVIEW', style:styleLabel, medium:fmtObj?fmtObj.name:'Stampa Fine Art', signature:artistName }, printCert:()=>{ if(typeof window!=='undefined') window.print(); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
